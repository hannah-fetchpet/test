<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Managing Risk Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  min-height: 100vh;
  background: #fda9ff;
  display: flex; align-items: center; justify-content: center;
  font-family: 'DM Sans', sans-serif; padding: 24px;
}
.container { width: 100%; max-width: 620px; }
.header { text-align: center; margin-bottom: 28px; }
.logo {
  display: inline-flex; align-items: center; gap: 8px;
  background: white; border-radius: 100px;
  padding: 8px 20px; margin-bottom: 18px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.12);
}
.logo-paw { font-size: 18px; }
.logo-text { font-size: 15px; font-weight: 800; color: #1a1a1a; letter-spacing: -0.03em; }
.logo-text span { color: #fd6fd4; }
h1 { color: #1a1a1a; font-size: 28px; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 6px; }
.subtitle { color: rgba(0,0,0,0.5); font-size: 14px; font-weight: 500; }
.progress-wrap { margin-bottom: 20px; }
.progress-labels { display: flex; justify-content: space-between; margin-bottom: 8px; }
.progress-labels span { font-size: 12px; font-weight: 600; color: rgba(0,0,0,0.45); }
.progress-labels span.right { color: #be1caa; }
.track { height: 6px; background: rgba(0,0,0,0.12); border-radius: 100px; overflow: hidden; }
.fill { height: 100%; background: #1a1a1a; border-radius: 100px; transition: width 0.4s cubic-bezier(.4,0,.2,1); }
.card {
  background: white; border-radius: 24px; padding: 30px 32px; margin-bottom: 16px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.12);
}
.q-header { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 22px; }
.q-num {
  min-width: 34px; height: 34px; border-radius: 10px; background: #fda9ff;
  display: flex; align-items: center; justify-content: center;
  color: white; font-weight: 800; font-size: 14px; flex-shrink: 0;
}
.q-text { color: #1a1a1a; font-size: 16px; line-height: 1.6; font-weight: 600; padding-top: 4px; }
.options { display: flex; flex-direction: column; gap: 9px; }
.opt {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 13px 16px; border-radius: 14px;
  border: 2px solid #f0f0f0; background: #fafafa;
  cursor: pointer; text-align: left; width: 100%;
  transition: all 0.16s ease; font-family: 'DM Sans', sans-serif;
}
.opt:hover { border-color: #fd6fd4; background: #fff0fd; }
.opt.selected { border-color: #fd6fd4; background: #fff0fd; transform: translateX(3px); }
.opt-ltr {
  min-width: 26px; height: 26px; border-radius: 8px;
  border: 2px solid #e0e0e0; background: white;
  display: flex; align-items: center; justify-content: center;
  color: #999; font-size: 11px; font-weight: 700; flex-shrink: 0; transition: all 0.16s;
}
.opt.selected .opt-ltr { border-color: #fd6fd4; background: #fda9ff; color: white; }
.opt-txt { color: #444; font-size: 13.5px; line-height: 1.5; padding-top: 3px; font-weight: 500; }
.opt.selected .opt-txt { color: #1a1a1a; }
.nav { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
.nav-prev {
  padding: 11px 22px; border-radius: 12px;
  border: 2px solid rgba(0,0,0,0.15); background: white;
  color: #666; cursor: pointer; font-size: 13px; font-weight: 600;
  font-family: 'DM Sans', sans-serif; transition: all 0.16s;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.nav-prev:disabled { color: #bbb; cursor: not-allowed; box-shadow: none; }
.nav-prev:not(:disabled):hover { border-color: #1a1a1a; color: #1a1a1a; }
.nav-next {
  padding: 11px 22px; border-radius: 12px;
  border: 2px solid #1a1a1a; background: #1a1a1a;
  color: white; cursor: pointer; font-size: 13px; font-weight: 700;
  font-family: 'DM Sans', sans-serif; transition: all 0.16s;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}
.nav-next:hover { background: #333; }
.dots { display: flex; gap: 7px; }
.dot {
  width: 34px; height: 34px; border-radius: 10px;
  border: 2px solid rgba(0,0,0,0.15); background: white;
  color: #aaa; cursor: pointer; font-size: 12px; font-weight: 700;
  font-family: 'DM Sans', sans-serif; transition: all 0.16s;
  box-shadow: 0 2px 6px rgba(0,0,0,0.06);
}
.dot.answered { border-color: #fd6fd4; background: #fff0fd; color: #be1caa; }
.dot.active   { border-color: #1a1a1a; background: #1a1a1a; color: white; }
.submit-btn {
  padding: 11px 22px; border-radius: 12px; border: none;
  background: #fda9ff; color: white;
  cursor: pointer; font-size: 13px; font-weight: 700;
  font-family: 'DM Sans', sans-serif; transition: all 0.16s;
  box-shadow: 0 4px 16px rgba(249,114,208,0.4);
}
.submit-btn:disabled { background: #e0e0e0; color: #aaa; cursor: not-allowed; box-shadow: none; }
.submit-btn:not(:disabled):hover { background: #d94fc4; }
.hint { color: rgba(0,0,0,0.35); font-size: 12px; text-align: center; margin-top: 10px; font-weight: 500; }
.results-hidden { display: none; }
.score-card {
  background: white; border-radius: 24px; padding: 36px;
  text-align: center; margin-bottom: 16px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.12);
}
.score-emoji { font-size: 40px; margin-bottom: 10px; }
.score-num { font-size: 56px; font-weight: 800; line-height: 1; margin-bottom: 6px; letter-spacing: -0.04em; color: #1a1a1a; }
.score-label { font-size: 20px; font-weight: 800; margin-bottom: 6px; letter-spacing: -0.02em; }
.score-desc { color: #888; font-size: 14px; font-weight: 500; }
.review-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
.review-item {
  background: white; border-radius: 16px; padding: 16px 20px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.07);
}
.ri-q { color: #1a1a1a; font-size: 13px; line-height: 1.5; margin-bottom: 8px; font-weight: 600; }
.ri-wrong { color: #ef4444; font-size: 12px; margin-bottom: 3px; font-weight: 500; }
.ri-correct { color: #16a34a; font-size: 12px; font-weight: 500; }
.retake-btn {
  width: 100%; padding: 14px; border-radius: 14px;
  border: none; background: #1a1a1a; color: white;
  cursor: pointer; font-size: 14px; font-weight: 700;
  font-family: 'DM Sans', sans-serif; transition: all 0.16s;
  box-shadow: 0 4px 16px rgba(0,0,0,0.18);
}
.retake-btn:hover { background: #333; }
</style>
</head>

    <h1>Managing Risk Quiz</h1>
    <p class="subtitle">Select the best answer &middot; 1 point per question</p>
  </div>

  <div id="quiz-section">
    <div class="progress-wrap">
      <div class="progress-labels">
        <span id="q-counter">Question 1 of 4</span>
        <span class="right" id="ans-counter">0 answered</span>
      </div>
      <div class="track"><div class="fill" id="progress-fill" style="width:0%"></div></div>
    </div>
    <div class="card">
      <div class="q-header">
        <div class="q-num" id="q-num">1</div>
        <div class="q-text" id="q-text"></div>
      </div>
      <div class="options" id="options"></div>
    </div>
    <div class="nav">
      <button class="nav-prev" id="prev-btn" onclick="navigate(-1)" disabled>← Previous</button>
      <div class="dots" id="dots"></div>
      <button class="nav-next" id="next-btn" onclick="navigate(1)">Next →</button>
      <button class="submit-btn" id="submit-btn" onclick="submitQuiz()" disabled style="display:none">Submit Quiz</button>

  </div>

      <div class="score-emoji" id="score-emoji"></div>
      <div class="score-num" id="score-num"></div>
      <div class="score-label" id="score-label"></div>
      <div class="score-desc" id="score-desc"></div>
    </div>
    <div class="review-list" id="review-list"></div>
    <button class="retake-btn" onclick="retake()">↺ Retake Quiz</button>
  </div>

<script>
const questions = [
  {
    text: "Where do you log a near‑miss or minor incident, and what must be included?",
    options: [
      "In the incident and breach register with factual details of what, when, who, impact, and containment",
      "Only in AP notes; no register entry needed",
      "Email the CEO and skip the register unless it becomes serious",
      "Do nothing if the issue was quickly resolved"
    ],
    answer: 0
  },
  {
    text: "Which situations must be escalated immediately?",
    options: [
      "Any sanctions match or suspected data loss",
      "Routine refunds within policy",
      "Using an already‑approved tool with a vet",
      "Minor copy typos caught internally"
    ],
    answer: 0
  },
  {
    text: "What is Fetch's stance on sanctions and serious misconduct?",
    options: [
      "Zero tolerance; do not transact with designated persons, escalate matches, and never offer or accept improper benefits",
      "Allowed with manager approval if customer experience requires it",
      "Track quarterly and address only if repeated",
      "Leave decisions to Marketing and Comms"
    ],
    answer: 0
  },
  {
    text: "When is whistleblower protection available and who can you report to?",
    options: [
      "When reporting misconduct in good faith; report to the CEO or directly to ASIC if not comfortable internally",
      "Only after talking to your Team Lead and HR",
      "Only with legal counsel present",
      "Never available to contractors or partners"
    ],
    answer: 0
  }
];

const letters = ["A","B","C","D"];
const scoring = [
  { min:4, emoji:"🌟", label:"Excellent",        color:"#fd6fd4", desc:"Outstanding knowledge!" },
  { min:3, emoji:"✅", label:"Pass",             color:"#16a34a", desc:"Good understanding." },
  { min:2, emoji:"📖", label:"Needs Review",     color:"#f59e0b", desc:"Please review with your Lead." },
  { min:0, emoji:"🔄", label:"Re-take Required", color:"#ef4444", desc:"Please complete a refresher with your Lead." }
];

let current = 0;
let selected = new Array(questions.length).fill(null);

function render() {
  const q = questions[current];
  document.getElementById("q-num").textContent = current + 1;
  document.getElementById("q-text").textContent = q.text;
  document.getElementById("q-counter").textContent = "Question " + (current+1) + " of " + questions.length;
  const answered = selected.filter(s => s !== null).length;
  document.getElementById("ans-counter").textContent = answered + " answered";
  document.getElementById("progress-fill").style.width = (answered/questions.length*100) + "%";

  const opts = document.getElementById("options");
  opts.innerHTML = "";
  q.options.forEach((text, i) => {
    const btn = document.createElement("button");
    btn.className = "opt" + (selected[current] === i ? " selected" : "");
    btn.innerHTML = '<div class="opt-ltr">' + letters[i] + '</div><div class="opt-txt">' + text + '</div>';
    btn.onclick = () => { selected[current] = i; render(); };
    opts.appendChild(btn);
  });

  document.getElementById("prev-btn").disabled = current === 0;
  const isLast = current === questions.length - 1;
  document.getElementById("next-btn").style.display = isLast ? "none" : "inline-block";
  document.getElementById("submit-btn").style.display = isLast ? "inline-block" : "none";
  const allAnswered = selected.every(s => s !== null);
  document.getElementById("submit-btn").disabled = !allAnswered;
  document.getElementById("hint").style.display = (isLast && !allAnswered) ? "block" : "none";

  const dots = document.getElementById("dots");
  dots.innerHTML = "";
  questions.forEach((_, i) => {
    const d = document.createElement("button");
    d.className = "dot" + (i === current ? " active" : selected[i] !== null ? " answered" : "");
    d.textContent = i + 1;
    d.onclick = () => { current = i; render(); };
    dots.appendChild(d);
  });
}

function navigate(dir) {
  current = Math.max(0, Math.min(questions.length - 1, current + dir));
  render();
}

function submitQuiz() {
  const score = selected.filter((s, i) => s === questions[i].answer).length;
  const result = scoring.find(s => score >= s.min);

  document.getElementById("score-emoji").textContent = result.emoji;
  document.getElementById("score-num").textContent = score + "/" + questions.length;
  document.getElementById("score-num").style.color = result.color;
  document.getElementById("score-label").textContent = result.label;
  document.getElementById("score-label").style.color = result.color;
  document.getElementById("score-desc").textContent = result.desc;

  const reviewList = document.getElementById("review-list");
  reviewList.innerHTML = "";
  questions.forEach((q, i) => {
    const correct = selected[i] === q.answer;
    const div = document.createElement("div");
    div.className = "review-item";
    div.style.borderLeft = "4px solid " + (correct ? "#16a34a" : "#ef4444");
    div.innerHTML =
      '<div class="ri-q"><strong style="color:#aaa;font-weight:600">Q' + (i+1) + '.</strong> ' + q.text + '</div>' +
      (!correct ? '<div class="ri-wrong">✗ Your answer: ' + letters[selected[i]] + ' — ' + q.options[selected[i]] + '</div>' : '') +
      '<div class="ri-correct">' + (correct ? '✓ Correct' : '✓ Correct answer') + ': ' + letters[q.answer] + ' — ' + q.options[q.answer] + '</div>';
    reviewList.appendChild(div);
  });

  document.getElementById("quiz-section").style.display = "none";
  document.getElementById("results-section").className = "";
}

function retake() {
  selected = new Array(questions.length).fill(null);
  current = 0;
  document.getElementById("quiz-section").style.display = "block";
  document.getElementById("results-section").className = "results-hidden";
  render();
}

render();
</script>
